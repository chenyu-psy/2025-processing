<!-- Complete example figure that can be included as one block. -->
<div class="fig-html-example">
  <div class="fig-pair">
    <div class="fig-card fig-card-object">
      <img
        class="fig-icon"
        src="../figures/figures_html/icons/object-orange.svg"
        alt="Orange memory item"
      >
      <div class="fig-card-label">memory item</div>
    </div>
    <div class="fig-plus">+</div>
    <div class="fig-card fig-card-fox">
      <img
        class="fig-icon"
        src="../figures/figures_html/icons/fox.svg"
        alt="White fox for the processing task"
      >
      <div class="fig-card-label">processing item</div>
    </div>
  </div>
  <div class="fig-arrow" aria-hidden="true">→</div>
  <div class="fig-callout">click the fox</div>
</div>
